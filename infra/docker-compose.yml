# silva-omnium 자체호스팅 docker compose
#
# 호스트 (M1 Mac mini): ollama 만 네이티브 (브루로 설치, 호스트 :11434 LISTEN)
# 컨테이너: code-server (편집기) + caddy (리버스 프록시)
# 워처:    호스트 launchd → docker compose exec 로 트리거
#
# 실행: cd infra && docker compose up -d --build
# 종료: cd infra && docker compose down
#
# 필수 .env (이 디렉토리에):
#   SILVA_REPO=/Users/peterseo/peterica/silva-omnium     # 호스트의 repo 절대 경로
#   SILVA_CODE_SERVER_PASSWORD=...                       # install-mac-mini.sh 가 자동 생성

services:
  code-server:
    build:
      context: ..
      dockerfile: infra/code-server.Dockerfile
    image: silva-code-server:latest
    container_name: silva-code-server
    restart: unless-stopped
    volumes:
      - ${SILVA_REPO:?SILVA_REPO must be set in infra/.env}:/workspace
      # Linux 바이너리(rollup 등) 가 호스트 macOS 와 충돌하지 않도록 격리
      - silva-node-modules:/workspace/web/node_modules
    environment:
      - PASSWORD=${SILVA_CODE_SERVER_PASSWORD:?SILVA_CODE_SERVER_PASSWORD must be set in infra/.env}
      - BIND_ADDR=0.0.0.0:8080
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:latest}
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - silva

  caddy:
    image: caddy:2-alpine
    container_name: silva-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ${SILVA_REPO}/infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${SILVA_REPO}/web/dist:/srv:ro
      - silva-caddy-data:/data
      - silva-caddy-config:/config
    networks:
      - silva
    depends_on:
      - code-server

networks:
  silva:
    name: silva-omnium

volumes:
  silva-caddy-data:
  silva-caddy-config:
  silva-node-modules:
